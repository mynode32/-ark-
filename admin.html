<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çark Widget - Admin Panel</title>
  <meta name="description" content="Çark widget yönetim paneli - dilimleri, ayarları ve katılımcıları yönetin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/admin.css">
</head>
<body>
  <!-- Auth -->
  <div class="admin-password-overlay" id="adminPasswordOverlay">
    <div class="admin-password-box">
      <div class="admin-password-icon">🔒</div>
      <h2 id="authTitle">Giriş Yap</h2>
      <p id="authSubtitle">Mağazanızın admin paneline giriş yapın</p>

      <div id="authFieldStoreName" style="display:none">
        <input type="text" class="admin-text-input" id="authStoreName" placeholder="Mağaza Adı" autocomplete="off">
      </div>
      <input type="email" class="admin-text-input" id="authEmail" placeholder="E-posta" autocomplete="username">
      <input type="password" class="admin-text-input admin-password-input" id="authPassword" placeholder="Şifre" autocomplete="current-password">

      <div class="admin-password-error" id="adminPasswordError"></div>
      <button class="btn btn-primary" id="authSubmitBtn" style="width:100%">Giriş Yap</button>

      <div class="admin-password-hint">
        <span id="authSwitchToRegisterWrap">Hesabınız yok mu? <a href="#" id="authSwitchToRegister">Mağaza Oluştur</a></span>
        <span id="authSwitchToLoginWrap" style="display:none">Zaten hesabınız var mı? <a href="#" id="authSwitchToLogin">Giriş Yap</a></span>
      </div>
    </div>
  </div>

  <div class="admin-container" id="adminContent" style="display:none">
    <header class="admin-header">
      <div class="admin-logo">🎡 Çark Admin <span id="adminStoreName" style="font-size:13px;font-weight:400;opacity:0.6;"></span></div>
      <nav class="admin-nav">
        <a href="#" class="active" data-tab="settings" aria-current="page">⚙️ Çark Ayarları</a>
        <a href="#" data-tab="appearance">🎨 Görünüm</a>
        <a href="#" data-tab="entries">👥 Katılımcılar</a>
        <a href="#" data-tab="integration">🔌 Entegrasyon</a>
      </nav>
      <button id="logoutBtn" class="btn btn-ghost" style="padding:8px 16px;font-size:13px;">Çıkış Yap</button>
    </header>
    <main id="admin-main">
      <!-- Tabs will be rendered here by admin.js -->
    </main>
  </div>
  
  <div class="toast" id="toast">✅ Kaydedildi</div>
  
  <div class="edit-modal-overlay" id="editModal">
    <div class="edit-modal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle" tabindex="-1">
      <h3>
        <span id="editModalTitle">✏️ Dilim Düzenle</span>
        <button class="close-modal-btn" id="closeModalBtn">&times;</button>
      </h3>
      <div id="editModalContent"></div>
    </div>
  </div>

  <div class="edit-modal-overlay" id="kvkkPreviewModal">
    <div class="edit-modal kvkk-preview-modal" role="dialog" aria-modal="true" aria-labelledby="kvkkPreviewModalTitle" tabindex="-1">
      <h3>
        <span id="kvkkPreviewModalTitle">👁️ Müşterinin Göreceği Metin</span>
        <button class="close-modal-btn" id="closeKvkkPreviewBtn">&times;</button>
      </h3>
      <div class="kvkk-preview-text" id="kvkkPreviewText"></div>
    </div>
  </div>

  <a href="index.html" id="demoLink" style="position:fixed;bottom:20px;left:20px;padding:12px 24px;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;text-decoration:none;font-size:14px;backdrop-filter:blur(10px);transition:all 0.3s;z-index:100;display:flex;align-items:center;gap:8px;">
    <span>←</span> Demo Sayfası
  </a>

  <script>
    // ?apiUrl=http://localhost:3001 ile yerel/farklı bir backend'e bağlanmayı test etmek için
    var _apiUrl = new URLSearchParams(location.search).get('apiUrl');
    if (_apiUrl) window.CARK_API_URL = _apiUrl;
  </script>
  <script type="module" src="/src/admin.js"></script>
</body>
</html>
