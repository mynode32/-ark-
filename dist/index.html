<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çark Çevir Kazan - Demo</title>
  <meta name="description" content="Mağazanız için çark çevir kazan popup widget sistemi">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    /* Demo page background styling - make it look like a store */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
    .demo-header { padding: 20px 40px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .demo-logo { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #FFD700, #FFA502); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .demo-nav { display: flex; gap: 24px; }
    .demo-nav a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: color 0.3s; }
    .demo-nav a:hover { color: #FFD700; }
    .demo-hero { padding: 80px 40px; text-align: center; background: linear-gradient(135deg, #0F0C29 0%, #302B63 50%, #24243E 100%); }
    .demo-hero h1 { font-family: 'Outfit', sans-serif; font-size: 48px; margin-bottom: 16px; }
    .demo-hero p { font-size: 18px; color: rgba(255,255,255,0.6); max-width: 600px; margin: 0 auto 32px; }
    .demo-btn { display: inline-block; padding: 16px 32px; background: linear-gradient(135deg, #FFD700, #FFA502); color: #1a1a2e; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 16px; border: none; border-radius: 12px; cursor: pointer; text-decoration: none; transition: all 0.3s; box-shadow: 0 4px 15px rgba(255,215,0,0.2); }
    .demo-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,215,0,0.4); }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 60px 40px; }
    .demo-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 64px; transition: all 0.3s; }
    .demo-card:hover { transform: translateY(-4px); border-color: rgba(255,215,0,0.3); background: rgba(255,255,255,0.08); }
    .demo-admin-link { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #fff; text-decoration: none; font-size: 14px; backdrop-filter: blur(10px); transition: all 0.3s; z-index: 100; display: flex; align-items: center; gap: 8px; }
    .demo-admin-link:hover { background: rgba(255,215,0,0.1); border-color: #FFD700; color: #FFD700; }
    
    @media (max-width: 768px) {
      .demo-header { flex-direction: column; gap: 16px; }
      .demo-hero h1 { font-size: 36px; }
      .demo-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); padding: 30px 20px; }
    }
  </style>
  <script type="module" crossorigin src="/assets/main-DkHokHJT.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/storage-CjHaOMlw.js">
  <link rel="stylesheet" crossorigin href="/assets/main-Bv-AwWa0.css">
</head>
<body>
  <header class="demo-header">
    <div class="demo-logo">DEMO MAĞAZA</div>
    <nav class="demo-nav">
      <a href="#">Yeni Gelenler</a>
      <a href="#">Kadın</a>
      <a href="#">Erkek</a>
      <a href="#">İndirimler</a>
    </nav>
  </header>
  
  <section class="demo-hero">
    <h1>🎡 Çark Çevir Kazan</h1>
    <p>Bu bir demo mağaza sayfasıdır. Sayfada biraz aşağı kaydırarak veya butona tıklayarak çark widget'ını test edebilirsiniz.</p>
    <button class="demo-btn" id="open-wheel-btn">Hemen Test Et</button>
  </section>
  
  <div class="demo-grid">
    <div class="demo-card">👕</div>
    <div class="demo-card">👗</div>
    <div class="demo-card">👟</div>
    <div class="demo-card">🧥</div>
    <div class="demo-card">👜</div>
    <div class="demo-card">🕶️</div>
    <div class="demo-card">⌚</div>
    <div class="demo-card">💍</div>
  </div>
  
  <a href="admin.html" class="demo-admin-link"><span>⚙️</span> Admin Paneline Git</a>
  
  <script>
    document.getElementById('open-wheel-btn').addEventListener('click', () => {
      if (window.CarkWidget) window.CarkWidget.open();
    });
  </script>
</body>
</html>
