<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyStore | Süper Admin</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="/mystore/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/superAdmin-BFVGZEU_.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/assets/superAdmin-Dhz437w1.css">
</head>
<body>
  <main class="super-shell">
    <section class="super-login" id="superLogin">
      <div class="super-brand"><img src="/mystore/assets/logo-mark.svg" alt="" width="42" height="42"><span>mystore</span><small>Süper Admin</small></div>
      <form id="superLoginForm">
        <p>EKİP ERİŞİMİ</p><h1>Yönetim merkezine giriş</h1><span>Bu alan yalnızca yetkili MyStore ekibi içindir.</span>
        <label>E-posta<input id="superEmail" type="email" autocomplete="username" required></label>
        <label>Şifre<span class="super-password-field"><input id="superPassword" type="password" autocomplete="current-password" required><button type="button" id="superPasswordToggle" aria-label="Şifreyi göster">Göster</button></span></label>
        <div class="super-error" id="superLoginError" role="alert"></div>
        <button type="submit">Giriş Yap</button>
      </form>
    </section>
    <section class="super-dashboard" id="superDashboard" hidden>
      <header><div><p>MyStore / Süper Admin</p><h1>Operasyon Merkezi</h1><span id="lastUpdated"></span></div><div class="header-actions"><button id="refreshOverview" class="ghost">↻ Yenile</button><button id="exportStores" class="ghost">CSV İndir</button><button id="superLogout" class="ghost">Çıkış Yap</button></div></header>
      <div class="super-stats" id="superStats"></div>
      <section class="super-card"><div class="super-card-head"><div><h2>Mağazalar</h2><p>Canlı kullanım, kupon sağlığı ve abonelik takibi</p></div><div class="filters"><input id="storeSearch" type="search" placeholder="Mağaza veya slug ara"><select id="statusFilter"><option value="">Tüm durumlar</option><option value="active">Aktif ücretli</option><option value="trialing">Denemede</option><option value="expired">Süresi dolmuş</option></select><select id="connectionFilter"><option value="">Tüm bağlantılar</option><option value="ikas">İkas bağlı</option><option value="manual">İkas bağlı değil</option></select></div></div><div class="table-wrap"><table><thead><tr><th>Mağaza</th><th>Plan / Süre</th><th>Aktivite</th><th>Kupon</th><th>Bağlantı</th><th>Son İşlem</th><th></th></tr></thead><tbody id="storeRows"></tbody></table></div></section>
    </section>
  </main>
  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
  <aside class="store-drawer" id="storeDrawer" hidden><button class="drawer-close" id="drawerClose" aria-label="Kapat">×</button><div id="storeDetail"></div></aside>
</body>
</html>
