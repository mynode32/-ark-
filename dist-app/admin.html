<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çark Widget - Admin Panel</title>
  <meta name="description" content="Çark widget yönetim paneli - dilimleri, ayarları ve katılımcıları yönetin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/admin-DsJSKnM8.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/storage-D_1Co3aL.js">
  <link rel="stylesheet" crossorigin href="/assets/admin-DsQrNAsK.css">
</head>
<body>
  <!-- Auth -->
  <div class="admin-password-overlay" id="adminPasswordOverlay">
    <div class="admin-password-box">
      <div class="admin-password-icon">🔒</div>
      <h2 id="authTitle">Giriş Yap</h2>
      <p id="authSubtitle">Mağazanızın admin paneline giriş yapın</p>

      <div id="authFieldStoreName" style="display:none">
        <input type="text" class="admin-password-input" id="authStoreName" placeholder="Mağaza Adı" autocomplete="off">
      </div>
      <input type="email" class="admin-password-input" id="authEmail" placeholder="E-posta" autocomplete="username">
      <input type="password" class="admin-password-input" id="authPassword" placeholder="Şifre" autocomplete="current-password">

      <div class="admin-password-error" id="adminPasswordError"></div>
      <button class="btn btn-primary" id="authSubmitBtn" style="width:100%">Giriş Yap</button>

      <div class="admin-password-hint">
        <span id="authSwitchToRegisterWrap">Hesabınız yok mu? <a href="#" id="authSwitchToRegister">Mağaza Oluştur</a></span>
        <span id="authSwitchToLoginWrap" style="display:none">Zaten hesabınız var mı? <a href="#" id="authSwitchToLogin">Giriş Yap</a></span>
      </div>
    </div>
  </div>

  <div class="admin-container" id="adminContent" style="display:none">
    <header class="admin-header">
      <div class="admin-logo">🎡 Çark Admin <span id="adminStoreName" style="font-size:13px;font-weight:400;opacity:0.6;"></span></div>
      <nav class="admin-nav">
        <a class="active" data-tab="settings">⚙️ Çark Ayarları</a>
        <a data-tab="appearance">🎨 Görünüm</a>
        <a data-tab="entries">👥 Katılımcılar</a>
        <a data-tab="integration">🔌 Entegrasyon</a>
      </nav>
      <button id="logoutBtn" style="background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;">Çıkış Yap</button>
    </header>
    <main id="admin-main">
      <!-- Tabs will be rendered here by admin.js -->
    </main>
  </div>
  
  <div class="toast" id="toast">✅ Kaydedildi</div>
  
  <div class="edit-modal-overlay" id="editModal">
    <div class="edit-modal">
      <h3>
        <span>✏️ Dilim Düzenle</span>
        <button class="close-modal-btn" id="closeModalBtn">&times;</button>
      </h3>
      <div id="editModalContent"></div>
    </div>
  </div>
  
  <a href="index.html" style="position:fixed;bottom:20px;left:20px;padding:12px 24px;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;text-decoration:none;font-size:14px;backdrop-filter:blur(10px);transition:all 0.3s;z-index:100;display:flex;align-items:center;gap:8px;">
    <span>←</span> Demo Sayfası
  </a>

  <script>
    // ?apiUrl=http://localhost:3001 ile yerel/farklı bir backend'e bağlanmayı test etmek için
    var _apiUrl = new URLSearchParams(location.search).get('apiUrl');
    if (_apiUrl) window.CARK_API_URL = _apiUrl;
  </script>
</body>
</html>
